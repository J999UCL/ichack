<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Socket.IO Connection</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .info { background: #e3f2fd; color: #1565c0; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Socket.IO Debug Page</h1>

    <div>
        <button onclick="testConnection()">Test Connection</button>
        <button onclick="testSearch()">Test Search</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>

    <div id="logs"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script>
        const socket = io();
        const logsDiv = document.getElementById('logs');

        function addLog(message, type = 'info') {
            const logDiv = document.createElement('div');
            logDiv.className = `log ${type}`;
            logDiv.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(logDiv);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function clearLogs() {
            logsDiv.innerHTML = '';
        }

        function testConnection() {
            addLog('Testing connection...', 'info');
            socket.emit('test', { message: 'Hello from client' });
        }

        function testSearch() {
            addLog('Testing search...', 'info');
            socket.emit('start_search', { article_title: 'Artificial Intelligence' });
        }

        // Socket event listeners
        socket.on('connect', () => {
            addLog('Connected to server!', 'success');
        });

        socket.on('disconnect', () => {
            addLog('Disconnected from server', 'error');
        });

        socket.on('connected', (data) => {
            addLog(`Server says: ${data.message}`, 'success');
        });

        socket.on('search_started', (data) => {
            addLog(`Search started for: ${data.article}`, 'info');
        });

        socket.on('tree_update', (data) => {
            addLog(`Tree update received: ${Object.keys(data).length} nodes`, 'info');
        });

        socket.on('search_complete', (data) => {
            addLog(`Search complete: ${data.message}`, 'success');
        });

        socket.on('error', (data) => {
            addLog(`Error: ${data.message}`, 'error');
        });

        socket.on('connect_error', (error) => {
            addLog(`Connection error: ${error}`, 'error');
        });

        // Initial log
        addLog('Debug page loaded', 'info');
    </script>
</body>
</html>
